resources:
  Conditions:
    IsNotLocal:
      Fn::Not:
        - Fn::Equals:
            - ${sls:stage}
            - local
  Resources:
    InsightsTable:
      Type: AWS::DynamoDB::Table
      Condition: IsNotLocal
      Properties:
        TableName: ${self:custom.stageConfig.tableName}
        BillingMode: PAY_PER_REQUEST
        Tags:
          - Key: Project
            Value: ${self:custom.awsTags.project}
          - Key: Application
            Value: ${self:custom.awsTags.application}
          - Key: ManagedBy
            Value: ${self:custom.awsTags.managedBy}
          - Key: Environment
            Value: ${sls:stage}
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: GSI1PK
            AttributeType: S
          - AttributeName: GSI1SK
            AttributeType: S
          - AttributeName: GSI2PK
            AttributeType: S
          - AttributeName: GSI2SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: GSI1
            KeySchema:
              - AttributeName: GSI1PK
                KeyType: HASH
              - AttributeName: GSI1SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: GSI2
            KeySchema:
              - AttributeName: GSI2PK
                KeyType: HASH
              - AttributeName: GSI2SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
    CustomersTable:
