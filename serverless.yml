service: insights-backend
frameworkVersion: '3'

plugins:
  - serverless-esbuild
  - serverless-offline

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'local'}
  region: ${self:custom.stageConfig.region}
  logRetentionInDays: 30
  stackTags:
    Project: ${self:custom.awsTags.project}
    Application: ${self:custom.awsTags.application}
    ManagedBy: ${self:custom.awsTags.managedBy}
    Environment: ${sls:stage}
  tags:
    Project: ${self:custom.awsTags.project}
    Application: ${self:custom.awsTags.application}
    ManagedBy: ${self:custom.awsTags.managedBy}
    Environment: ${sls:stage}
  httpApi:
    cors:
      allowedOrigins:
        - '*'
      allowedHeaders:
        - '*'
        - Authorization
        - authorization
        - Content-Type
        - content-type
        - X-Amz-Date
        - x-amz-date
        - X-Amz-Security-Token
        - x-amz-security-token
        - X-Amz-User-Agent
        - x-amz-user-agent
        - X-Api-Key
        - x-api-key
        - ngrok-skip-browser-warning
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowCredentials: false
      maxAge: 86400
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:Query
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:TransactWriteItems
            - dynamodb:DescribeTable
          Resource:
            - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:custom.stageConfig.tableName}
            - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:custom.stageConfig.tableName}/index/*
            - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:custom.stageConfig.customersTableName, self:custom.stageConfig.tableName}
            - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:custom.stageConfig.customersTableName, self:custom.stageConfig.tableName}/index/*
            - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:custom.stageConfig.plansTableName, self:custom.stageConfig.tableName}
            - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:custom.stageConfig.plansTableName, self:custom.stageConfig.tableName}/index/*
            - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:custom.stageConfig.billingTableName, self:custom.stageConfig.tableName}
            - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:custom.stageConfig.billingTableName, self:custom.stageConfig.tableName}/index/*
            - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:custom.stageConfig.financeTableName, self:custom.stageConfig.tableName}
            - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:custom.stageConfig.financeTableName, self:custom.stageConfig.tableName}/index/*
            - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:custom.stageConfig.surveysTableName, self:custom.stageConfig.tableName}
            - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:custom.stageConfig.surveysTableName, self:custom.stageConfig.tableName}/index/*
  environment:
    APP_STAGE: ${sls:stage}
    JWT_SECRET: ${self:custom.stageConfig.jwtSecret}
    DYNAMODB_TABLE_NAME: ${self:custom.stageConfig.tableName}
    DYNAMODB_CUSTOMERS_TABLE_NAME: ${self:custom.stageConfig.customersTableName, self:custom.stageConfig.tableName}
    DYNAMODB_PLANS_TABLE_NAME: ${self:custom.stageConfig.plansTableName, self:custom.stageConfig.tableName}
    DYNAMODB_BILLING_TABLE_NAME: ${self:custom.stageConfig.billingTableName, self:custom.stageConfig.tableName}
    DYNAMODB_FINANCE_TABLE_NAME: ${self:custom.stageConfig.financeTableName, self:custom.stageConfig.tableName}
    DYNAMODB_SURVEYS_TABLE_NAME: ${self:custom.stageConfig.surveysTableName, self:custom.stageConfig.tableName}
    DYNAMODB_ENDPOINT: ${self:custom.stageConfig.dynamoEndpoint}

custom:
  awsTags:
    project: insights-bff
    application: insights-bff
    managedBy: serverless
  stageConfig: ${file(./config/stages.yml):${sls:stage}}
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    format: cjs
    concurrency: 10
  serverless-offline:
    httpPort: 3001

