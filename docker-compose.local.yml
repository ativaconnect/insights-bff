services:
  dynamodb:
    image: amazon/dynamodb-local:2.5.2
    container_name: insights-dynamodb
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    ports:
      - "8000:8000"

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    container_name: insights-dynamodb-admin
    environment:
      DYNAMO_ENDPOINT: http://dynamodb:8000
    ports:
      - "8001:8001"
    depends_on:
      - dynamodb

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: insights-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-create-bucket:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: insights-minio-bootstrap
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do echo 'waiting minio...' && sleep 2; done;
      /usr/bin/mc mb -p local/insights-analytics-local || true;
      /usr/bin/mc anonymous set private local/insights-analytics-local || true;
      echo 'minio bucket ready';
      "

volumes:
  minio-data:
