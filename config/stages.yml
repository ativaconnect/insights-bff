local:
  region: us-east-1
  corsAllowedOrigin: http://localhost:4200
  apiDomain: localhost:3001
  tableName: insights-local
  customersTableName: insights-customers-local
  plansTableName: insights-plans-local
  billingTableName: insights-billing-local
  financeTableName: insights-finance-local
  surveysTableName: insights-surveys-local
  dynamoEndpoint: http://localhost:8000
  jwtSecret: local-dev-secret
  appClientToken: local-app-client-token
  appClientTokenPrevious: ''
  loginWindowSeconds: 900
  loginLockSeconds: 900
  loginMaxAttemptsPerLogin: 10
  loginMaxAttemptsPerIp: 40
  loginGuardTtlSeconds: 86400
  captchaEnabled: false
  captchaSecret: ''
  captchaVerifyUrl: https://hcaptcha.com/siteverify

dev:
  region: us-east-1
  corsAllowedOrigin: ${env:CORS_ALLOWED_ORIGIN_DEV, 'https://insigths-dev.ativaconnect.com.br'}
  apiDomain: ${env:API_DOMAIN_DEV, 'insigths.bff-dev.ativaconnect.com.br'}
  tableName: insights-dev
  customersTableName: insights-customers-dev
  plansTableName: insights-plans-dev
  billingTableName: insights-billing-dev
  financeTableName: insights-finance-dev
  surveysTableName: insights-surveys-dev
  dynamoEndpoint: ''
  jwtSecret: ${env:JWT_SECRET, 'replace-in-dev'}
  appClientToken: ${env:APP_CLIENT_TOKEN, 'replace-in-dev'}
  appClientTokenPrevious: ${env:APP_CLIENT_TOKEN_PREVIOUS, ''}
  loginWindowSeconds: ${env:LOGIN_WINDOW_SECONDS_DEV, 900}
  loginLockSeconds: ${env:LOGIN_LOCK_SECONDS_DEV, 900}
  loginMaxAttemptsPerLogin: ${env:LOGIN_MAX_ATTEMPTS_PER_LOGIN_DEV, 5}
  loginMaxAttemptsPerIp: ${env:LOGIN_MAX_ATTEMPTS_PER_IP_DEV, 20}
  loginGuardTtlSeconds: ${env:LOGIN_GUARD_TTL_SECONDS_DEV, 86400}
  captchaEnabled: ${env:CAPTCHA_ENABLED_DEV, false}
  captchaSecret: ${env:CAPTCHA_SECRET_DEV, ''}
  captchaVerifyUrl: ${env:CAPTCHA_VERIFY_URL_DEV, 'https://hcaptcha.com/siteverify'}

